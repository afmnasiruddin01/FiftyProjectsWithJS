<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="style.css" />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
      integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
      crossorigin="anonymous"
      referrerpolicy="no-referrer"
    />
    <title>Double Vertical Slider UI</title>
  </head>
  <body>
    <div class="slider-container">
      <div class="left-slide">
        <div style="background-color: #fd3555">
          <h1>Nature flower</h1>
          <p>All in pink</p>
        </div>
        <div style="background-color: #2a86ba">
          <h1>Blue sky</h1>
          <p>All in pink</p>
        </div>
        <div style="background-color: #252e33">
          <h1>Loanly castle</h1>
          <p>All in pink</p>
        </div>
        <div style="background-color: #ffb866">
          <h1>Flying eagle</h1>
          <p>All in pink</p>
        </div>
      </div>
      <div class="right-slide">
        <div
          style="
            background-image: url(&quot;https://plus.unsplash.com/premium_photo-1661832711795-a1cff19f9706?w=1600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8MXx8Zmx5aW5nJTIwZWFnbGV8ZW58MHx8MHx8fDA%3D&quot;);
          "
        ></div>
        <div
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1449452198679-05c7fd30f416?w=1600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Y2FzdGxlfGVufDB8fDB8fHww&quot;);
          "
        ></div>
        <div
          style="
            background-image: url(&quot;https://plus.unsplash.com/premium_photo-1733317236155-b0e1a2930f37?w=1600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8OXx8Ymx1ZSUyMHNreXxlbnwwfHwwfHx8MA%3D%3D&quot;);
          "
        ></div>
        <div
          style="
            background-image: url(&quot;https://images.unsplash.com/photo-1471899236350-e3016bf1e69e?w=1600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Mnx8Zmxvd2VyfGVufDB8fDB8fHww&quot;);
          "
        ></div>
      </div>
      <div class="action-button">
        <button class="down-button">
          <i class="fa-solid fa-circle-arrow-down"></i>
        </button>
        <button class="up-button">
          <i class="fa-solid fa-circle-arrow-up"></i>
        </button>
      </div>
    </div>

    <script src="script.js"></script>
  </body>
</html>
